# Signex monorepo — multi-container stack.
# Run: docker compose up -d --build
# Env comes from the root .env (see .env.example). Host ports overridable via *_PORT vars.

services:
  postgres:
    image: postgres:16-alpine
    container_name: signex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-signex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signex}
      POSTGRES_DB: ${POSTGRES_DB:-signex}
    ports:
      - "${POSTGRES_PORT:-3059}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-signex} -d ${POSTGRES_DB:-signex}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - signex-net

  # MinIO — S3-compatible media store for dev. Production points the SAME api env at real
  # Cloudflare R2 (set R2_ENDPOINT/R2_PUBLIC_ENDPOINT/creds), no code change.
  minio:
    image: minio/minio:latest
    container_name: signex-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${R2_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${R2_SECRET_ACCESS_KEY:-minioadmin}
      # CORS for browser presigned PUT (and GET) from the web/admin origins.
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ALLOW_ORIGIN:-*}
    ports:
      # 9000 = S3 API (also the browser presign host: localhost:9000); 9001 = web console.
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - signex-net

  # One-shot init: wait for MinIO, then create the bucket + public-read policy. Exits 0.
  minio-init:
    image: minio/mc:latest
    container_name: signex-minio-init
    depends_on:
      - minio
    environment:
      MINIO_USER: ${R2_ACCESS_KEY_ID:-minioadmin}
      MINIO_PASS: ${R2_SECRET_ACCESS_KEY:-minioadmin}
      BUCKET: ${R2_BUCKET:-signex-media}
    entrypoint: >-
      sh -c "until mc alias set local http://minio:9000 $$MINIO_USER $$MINIO_PASS; do echo wait-minio; sleep 1; done && mc mb --ignore-existing local/$$BUCKET && mc anonymous set download local/$$BUCKET && echo minio-init-done"
    networks:
      - signex-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: signex-api:latest
    container_name: signex-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      # Bucket must exist before the api boots (presign/confirm assume it).
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      API_PORT: ${API_PORT:-3060}
      # Inside the Compose network the DB host is the service name "postgres", not localhost.
      DATABASE_URL: postgresql://${POSTGRES_USER:-signex}:${POSTGRES_PASSWORD:-signex}@postgres:5432/${POSTGRES_DB:-signex}?schema=public
      # Seed admin (auth:seed creates a deterministic SYSTEM/ADMIN user before the importer runs).
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Signex Admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-change-me-please-32chars-long}
      # Media storage (S3-compatible). REQUIRED for the api to boot (AssetsModule R2_CONFIG
      # factory validates these at startup). Defaults target the bundled MinIO so the stack
      # boots out-of-the-box; override with real Cloudflare R2 creds via host env / secrets
      # in production (R2_PUBLIC_ENDPOINT then defaults to R2_ENDPOINT — a no-op for R2).
      # Server-side S3 calls hit R2_ENDPOINT (internal docker host minio:9000); the presigned
      # PUT URL handed to the browser uses R2_PUBLIC_ENDPOINT (browser-reachable localhost:9000).
      R2_ENDPOINT: ${R2_ENDPOINT:-http://minio:9000}
      R2_PUBLIC_ENDPOINT: ${R2_PUBLIC_ENDPOINT:-http://localhost:9000}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-minioadmin}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-minioadmin}
      R2_BUCKET: ${R2_BUCKET:-signex-media}
      R2_REGION: ${R2_REGION:-us-east-1}
      R2_PRESIGN_TTL: ${R2_PRESIGN_TTL:-300}
      # MEDIA_PUBLIC_BASE must NOT be unset or an r2.dev host (the publish gate rejects those).
      MEDIA_PUBLIC_BASE: ${MEDIA_PUBLIC_BASE:-http://localhost:9000/signex-media}
      # Control-plane secrets shared by api <-> web <-> admin route handlers.
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-dev-revalidate-secret-change-me}
      PREVIEW_SECRET: ${PREVIEW_SECRET:-dev-preview-secret-change-me}
      # URL the api's RevalidationService calls to trigger Next.js on-demand ISR on the web service.
      WEB_REVALIDATE_URL: ${WEB_REVALIDATE_URL:-http://web:3062/api/revalidate}
      # CORS + OriginGuard allow-list. Browser origin is the host-published URL even inside
      # the Compose network (the browser connects to the host, not the container name).
      AUTH_ALLOWED_ORIGINS: ${AUTH_ALLOWED_ORIGINS:-http://localhost:3062,http://localhost:3061}
    ports:
      - "${API_PORT:-3060}:3060"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3060/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - signex-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # SSG prerender bakes asset URLs at build time — pass the media base so a fresh image serves
        # working absolute image URLs (not relative /originals/… that 404 until a revalidation).
        MEDIA_PUBLIC_BASE: ${MEDIA_PUBLIC_BASE:-http://localhost:9000/signex-media}
    image: signex-web:latest
    container_name: signex-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3062
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      # Web PUBLIC read-path queries Postgres directly via @signex/db (one indexed row).
      DATABASE_URL: postgresql://${POSTGRES_USER:-signex}:${POSTGRES_PASSWORD:-signex}@postgres:5432/${POSTGRES_DB:-signex}?schema=public
      # Asset URLs are resolved at read time: MEDIA_PUBLIC_BASE + '/' + r2Key.
      MEDIA_PUBLIC_BASE: ${MEDIA_PUBLIC_BASE:-http://localhost:9000/signex-media}
      # Secret-gated on-demand revalidation + draft-mode entry (called by the api post-publish).
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-dev-revalidate-secret-change-me}
      PREVIEW_SECRET: ${PREVIEW_SECRET:-dev-preview-secret-change-me}
      # Admin origin allowed to iframe the /preview editor route (CSP frame-ancestors, set in
      # apps/web/next.config.ts scoped to /preview/:path* only — public routes are unaffected).
      PREVIEW_FRAME_ANCESTORS: ${PREVIEW_FRAME_ANCESTORS:-http://localhost:3061}
      # Server-side calls to the api (preview snapshot, form submit forwarding if proxied).
      API_URL: ${API_URL:-http://api:3060}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3060}
      # GA4 DebugView toggle: GA_DEBUG=1 flags hits as debug (surface in GA4 DebugView)
      # for local testing. Leave empty in production so real traffic isn't marked debug.
      GA_DEBUG: ${GA_DEBUG:-}
    ports:
      - "${WEB_PORT:-3062}:3062"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3062/en"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - signex-net

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    image: signex-admin:latest
    container_name: signex-admin
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3061
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      API_URL: ${API_URL:-http://api:3060}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3060}
      ADMIN_ORIGIN: ${ADMIN_ORIGIN:-http://localhost:3061}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3061,http://localhost:3062}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-dev-revalidate-secret-change-me}
      PREVIEW_SECRET: ${PREVIEW_SECRET:-dev-preview-secret-change-me}
      NEXT_PUBLIC_WEB_URL: ${NEXT_PUBLIC_WEB_URL:-http://localhost:3062}
    ports:
      - "${ADMIN_PORT:-3061}:3061"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3061/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - signex-net

volumes:
  pgdata:
  minio-data:

networks:
  signex-net:
    driver: bridge
